version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12

    commands:
      - pip install -r requirements.txt -t package/

  build:
    commands:
      - cd package
      - zip -r ../lambda.zip .
      - cd ..
      - zip -g lambda.zip lambda_function.py

artifacts:
  files:
    - lambda.zip